<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f2f2f2;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .login-box{
            width:400px;
            background:white;
            padding:30px;
            border-radius:15px;
            box-shadow:0px 0px 15px #aaa;
        }

        .error{
            color:red;
        }
    </style>

</head>

<body>


<div class="login-box">

    <h2 class="text-center mb-4">
        Admin Login
    </h2>


    {% if error %}
        <p class="error text-center">
            {{error}}
        </p>
    {% endif %}


    <form method="POST" action="/login">


        <div class="mb-3">

            <label>Email</label>

            <input 
            type="email"
            class="form-control"
            name="email"
            placeholder="Enter email"
            required>

        </div>



        <div class="mb-3">

            <label>Password</label>

            <input
            type="password"
            class="form-control"
            id="password"
            name="password"
            placeholder="Enter password"
            required>


        </div>



        <div class="mb-3">

            <input type="checkbox" 
            onclick="showPassword()">

            Show Password

        </div>



        <button 
        class="btn btn-primary w-100">

            Login

        </button>



    </form>


</div>



<script>

function showPassword(){

    let pass = document.getElementById("password");

    if(pass.type === "password"){
        pass.type="text";
    }
    else{
        pass.type="password";
    }

}

</script>


</body>
</html>
