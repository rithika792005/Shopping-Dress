<!DOCTYPE html>
<html>
<head>
    <title>Edit Product</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f4f4f4;
        }

        .container{
            margin-top:40px;
            max-width:700px;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0px 0px 10px #ccc;
        }
    </style>
</head>
<body>

<div class="container">

    <h2 class="mb-4">Edit Product</h2>

    <form method="POST">

        <div class="mb-3">
            <label>Product Name</label>
            <input
                type="text"
                name="name"
                class="form-control"
                value="{{ product.name }}"
                required>
        </div>

        <div class="mb-3">
            <label>Price</label>
            <input
                type="number"
                step="0.01"
                name="price"
                class="form-control"
                value="{{ product.price }}"
                required>
        </div>

        <div class="mb-3">
            <label>Description</label>
            <textarea
                name="description"
                class="form-control"
                rows="4"
                required>{{ product.description }}</textarea>
        </div>

        <button type="submit" class="btn btn-success">
            Update Product
        </button>

        <a href="/admin" class="btn btn-secondary">
            Back
        </a>

    </form>

</div>

</body>
</html>
